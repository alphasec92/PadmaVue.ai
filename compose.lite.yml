# ===========================================
# SecurityReview.ai - Docker Compose (Lite Mode)
# Backend + Frontend only - No Neo4j/Qdrant
# ===========================================
# Usage:
#   docker compose -f compose.lite.yml up --build -d
#   docker compose -f compose.lite.yml logs -f
#   docker compose -f compose.lite.yml down
# ===========================================

services:
  # ==========================================
  # Backend API Service
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securityreview-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - STORAGE_MODE=lite
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - UPLOAD_DIR=/app/uploads
      - DEBUG=false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - securityreview-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # Frontend Service
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securityreview-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - securityreview-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ==========================================
# Networks
# ==========================================
networks:
  securityreview-network:
    driver: bridge
