[pytest]
# Pytest configuration for PadmaVue.ai

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = backend/tests tests

# Markers
markers =
    integration: Integration tests that require Docker or external services
    unit: Unit tests that can run in isolation
    slow: Tests that take a long time to run

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using pytest-cov)
# [tool:pytest]
# addopts = --cov=app --cov-report=html --cov-report=term-missing

# Asyncio configuration
asyncio_mode = auto
