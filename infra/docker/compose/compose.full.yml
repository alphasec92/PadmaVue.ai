# ===========================================
# PadmaVue.ai - Docker Compose (Full Mode)
# Backend + Frontend + Neo4j + Qdrant
# ===========================================
# Usage:
#   docker compose -f infra/docker/compose/compose.full.yml up --build -d
#   docker compose -f infra/docker/compose/compose.full.yml logs -f
#   docker compose -f infra/docker/compose/compose.full.yml down
# ===========================================

services:
  # ==========================================
  # Backend API Service
  # ==========================================
  backend:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    container_name: padmavue-backend
    ports:
      - "8000:8000"
    env_file:
      - ../../../backend/.env
    environment:
      - STORAGE_MODE=full
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - UPLOAD_DIR=/app/uploads
      - DEBUG=false
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ../../../data:/app/data
      - ../../../logs:/app/logs
      - ../../../uploads:/app/uploads
    networks:
      - padmavue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Frontend Service
  # ==========================================
  frontend:
    build:
      context: ../../../frontend
      dockerfile: Dockerfile
    container_name: padmavue-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - padmavue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Neo4j Graph Database
  # ==========================================
  neo4j:
    image: neo4j:5.19-community
    container_name: padmavue-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/padmavue}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - padmavue-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ==========================================
  # Qdrant Vector Database
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: padmavue-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - padmavue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ==========================================
# Volumes
# ==========================================
volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

# ==========================================
# Networks
# ==========================================
networks:
  padmavue-network:
    driver: bridge
