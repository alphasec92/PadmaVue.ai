# ===========================================
# PadmaVue.ai - Quick Start with Pre-built Images
# ===========================================
# Run directly with: docker compose -f infra/docker/compose/docker-compose.hub.yml up -d
# No building required - pulls pre-built images from GitHub Container Registry
# ===========================================

version: "3.9"

services:
  # ==========================================
  # Backend API Service (Pre-built)
  # ==========================================
  backend:
    image: ghcr.io/padmavue-ai/padmavue.ai/backend:latest
    container_name: padmavue-backend
    ports:
      - "8000:8000"
    environment:
      # Application
      - APP_NAME=PadmaVue.ai
      - DEBUG=false
      - LOG_LEVEL=INFO
      
      # LLM Provider - Configure your preferred provider
      - LLM_PROVIDER=mock  # Options: mock, openai, anthropic, openrouter, gemini
      
      # OpenAI (uncomment and set if using)
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Anthropic (uncomment and set if using)
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      
      # OpenRouter (uncomment and set if using)
      # - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      
      # Google Gemini (uncomment and set if using)
      # - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      
      # Database connections
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-padmavue_dev}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      
      # Storage
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - UPLOAD_DIR=/app/uploads
      
      # CORS - Add your frontend URL if different
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - uploads_data:/app/uploads
    networks:
      - padmavue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Frontend Service (Pre-built)
  # ==========================================
  frontend:
    image: ghcr.io/padmavue-ai/padmavue.ai/frontend:latest
    container_name: padmavue-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - padmavue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Neo4j Graph Database
  # ==========================================
  neo4j:
    image: neo4j:5.19-community
    container_name: padmavue-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-padmavue_dev}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - padmavue-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ==========================================
  # Qdrant Vector Database
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: padmavue-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - padmavue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ==========================================
# Volumes
# ==========================================
volumes:
  backend_data:
  backend_logs:
  uploads_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

# ==========================================
# Networks
# ==========================================
networks:
  padmavue-network:
    driver: bridge
