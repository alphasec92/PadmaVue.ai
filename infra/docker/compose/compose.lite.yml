# ===========================================
# PadmaVue.ai - Docker Compose (Lite Mode)
# Backend + Frontend only - No Neo4j/Qdrant
# ===========================================
# Usage:
#   docker compose -f infra/docker/compose/compose.lite.yml up --build -d
#   docker compose -f infra/docker/compose/compose.lite.yml logs -f
#   docker compose -f infra/docker/compose/compose.lite.yml down
# ===========================================

services:
  # ==========================================
  # Backend API Service
  # ==========================================
  backend:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    container_name: padmavue-backend
    ports:
      - "8000:8000"
    env_file:
      - ../../../backend/.env
    environment:
      - STORAGE_MODE=lite
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - UPLOAD_DIR=/app/uploads
      - DEBUG=false
      # Override Ollama URL to use host.docker.internal for Docker access to host
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ../../../data:/app/data
      - ../../../logs:/app/logs
      - ../../../uploads:/app/uploads
    # Enable access to host machine (Windows/Mac Docker Desktop)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - padmavue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # Frontend Service
  # ==========================================
  frontend:
    build:
      context: ../../../frontend
      dockerfile: Dockerfile
    container_name: padmavue-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - padmavue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ==========================================
# Networks
# ==========================================
networks:
  padmavue-network:
    driver: bridge
